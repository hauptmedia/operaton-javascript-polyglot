name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Resolve project version
        id: project
        run: |
          VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Resolve GPG primary key
        id: gpg
        run: |
          set -euo pipefail
          GPG_FINGERPRINT="$(gpg --batch --list-secret-keys --with-colons --fingerprint | awk -F: '/^fpr:/ { print $10; exit }')"
          test -n "$GPG_FINGERPRINT"
          echo "fingerprint=$GPG_FINGERPRINT" >> "$GITHUB_OUTPUT"
          echo "MAVEN_GPG_KEY_NAME=${GPG_FINGERPRINT}!" >> "$GITHUB_ENV"

      - name: Check Maven Central
        id: central
        run: |
          set -euo pipefail
          ARTIFACT_URL="https://repo1.maven.org/maven2/com/elabric/bpm/extensions/operaton-javascript-polyglot/${{ steps.project.outputs.version }}/operaton-javascript-polyglot-${{ steps.project.outputs.version }}.pom"
          if curl --fail --silent --head "$ARTIFACT_URL" > /dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.project.outputs.version }} is already published to Maven Central."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.project.outputs.version }} is not published to Maven Central yet."
          fi

      - name: Publish GPG public key
        if: steps.central.outputs.published != 'true'
        run: |
          set -euo pipefail

          ensure_keyserver() {
            keyserver="$1"
            check_home="$(mktemp -d)"
            if timeout 30s gpg --homedir "$check_home" --batch --keyserver "$keyserver" --recv-keys "${{ steps.gpg.outputs.fingerprint }}"; then
              rm -rf "$check_home"
              echo "GPG public key is already available on $keyserver."
              return 0
            fi
            rm -rf "$check_home"

            timeout 30s gpg --batch --keyserver "$keyserver" --send-keys "${{ steps.gpg.outputs.fingerprint }}"

            for attempt in 1 2 3 4 5; do
              verify_home="$(mktemp -d)"
              if timeout 30s gpg --homedir "$verify_home" --batch --keyserver "$keyserver" --recv-keys "${{ steps.gpg.outputs.fingerprint }}"; then
                rm -rf "$verify_home"
                echo "GPG public key is visible on $keyserver."
                return 0
              fi
              rm -rf "$verify_home"
              sleep 15
            done

            echo "GPG public key was not visible on $keyserver in time."
            return 1
          }

          ensure_keyserver keyserver.ubuntu.com
          ensure_keyserver keys.openpgp.org

      - name: Publish to Maven Central
        if: steps.central.outputs.published != 'true'
        run: mvn -B -Pcentral-release deploy
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      - name: Build release artifacts
        if: steps.central.outputs.published == 'true'
        run: mvn -B package

      - name: Prepare release POM
        run: |
          cp pom.xml "target/operaton-javascript-polyglot-${{ steps.project.outputs.version }}.pom"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: operaton-javascript-polyglot-${{ github.ref_name }}
          path: |
            target/operaton-javascript-polyglot-*.jar
            target/operaton-javascript-polyglot-*.pom
            target/operaton-javascript-polyglot-*.asc
          if-no-files-found: error
          retention-days: 30
